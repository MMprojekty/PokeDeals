name: Translate UI to Hungarian

on:
  push:
    branches: [main]
    paths:
      - "web/messages/en.json"
      - "scripts/translate_web_messages.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate-hu:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenAI SDK
        run: python -m pip install --upgrade pip openai

      - name: Update Hungarian messages
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/translate_web_messages.py

      - name: Commit translation if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/messages/hu.json
          if git diff --staged --quiet; then
            echo "Hungarian translations already up to date."
            exit 0
          fi
          git commit -m "chore: update Hungarian UI translations"
          git push
