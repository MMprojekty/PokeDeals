name: Deploy web to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check Vercel secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::Missing VERCEL_TOKEN in GitHub Actions secrets."
            echo "Run: python3 scripts/setup_vercel.py"
            exit 1
          fi

      - name: Trigger Vercel production deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          payload=$(cat <<EOF
          {
            "name": "pokedeals",
            "target": "production",
            "gitSource": {
              "type": "github",
              "org": "MMprojekty",
              "repo": "PokeDeals",
              "ref": "${{ github.sha }}"
            }
          }
          EOF
          )
          response=$(curl -sS -w "\n%{http_code}" -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${payload}")
          body=$(echo "$response" | sed '$d')
          code=$(echo "$response" | tail -n 1)
          echo "$body"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::Vercel deploy API returned HTTP ${code}"
            exit 1
          fi
          url=$(echo "$body" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('url',''))" 2>/dev/null || true)
          if [ -n "$url" ]; then
            echo "Deployment started: https://${url}"
          fi
