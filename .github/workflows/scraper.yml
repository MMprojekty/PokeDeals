name: Scrape shop prices

on:
  schedule:
    # Three chances per hour — GitHub cron often misses single schedules.
    - cron: "5 * * * *"
    - cron: "25 * * * *"
    - cron: "45 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run even if data is still fresh"
        type: boolean
        default: false

concurrency:
  group: shop-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check data freshness
        id: stale
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.force) }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_LISTINGS_TABLE: shop_listings
          SCRAPE_STALE_MINUTES: "50"
        run: python3 scripts/check_scrape_stale.py

      - name: Skip — data is still fresh
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.force) && steps.stale.outputs.stale != 'true' }}
        run: |
          echo "Data age is ${{ steps.stale.outputs.age_minutes }} min — skipping scrape."

      - name: Set up Python
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.force) || steps.stale.outputs.stale == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install scraper dependencies
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.force) || steps.stale.outputs.stale == 'true' }}
        working-directory: scraper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run scraper
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.force) || steps.stale.outputs.stale == 'true' }}
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_LISTINGS_TABLE: shop_listings
        run: python scraper.py --headless
